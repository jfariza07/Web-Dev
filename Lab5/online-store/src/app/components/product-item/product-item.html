<div style="border: 1px solid #eee; padding: 15px; border-radius: 8px; text-align: center;">
  <img [src]="product().image" style="max-width: 100%; height: 200px; object-fit: contain;" />
  <h3>{{ product().name }}</h3>
  <p style="color: #666; font-size: 0.9em;">{{ product().description }}</p>
  <p><strong>Rating:</strong> {{ product().rating }} ⭐</p>
  <p style="color: #ee1111; font-weight: bold;">{{ product().price }} KZT</p>

  <div style="margin-top: 10px; display: flex; flex-direction: column; gap: 5px;">
    <button (click)="like()" style="cursor: pointer; background: #fff; border: 1px solid #ccc; padding: 5px;">
      ❤️ Likes: {{ product().likes }}
    </button>
    
    <div style="display: flex; gap: 5px;">
      <button (click)="shareOnWhatsApp()" style="flex: 1; cursor: pointer;">WhatsApp</button>
      <button (click)="shareOnTelegram()" style="flex: 1; cursor: pointer;">Telegram</button>
    </div>

    <button (click)="delete()" style="background: #ff4d4d; color: white; border: none; padding: 8px; cursor: pointer; border-radius: 4px;">
      Remove Product
    </button>
  </div>
</div>
