<div style="padding: 20px; font-family: Arial, sans-serif;">
  <h2 style="border-bottom: 2px solid #333; padding-bottom: 10px;">Our Featured Products</h2>
  <button (click)="loadCategories()" style="margin-bottom: 10px; padding: 8px; cursor: pointer;">
  Show Categories
</button>

<div *ngIf="categories.length > 0" style="margin-bottom: 15px; color: #555;">
  Filtered by: <span *ngFor="let cat of categories" style="margin-right: 10px; border: 1px solid #ccc; padding: 2px 5px;">{{ cat.name }}</span>
</div>


  
  <div style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px;">
    <div *ngFor="let product of products" 
         style="border: 1px solid #ddd; border-radius: 8px; padding: 15px; width: 250px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1);">
      <h3 style="margin-top: 0; color: #007bff;">{{ product.name }}</h3>
      <p style="color: #666; font-size: 14px; height: 40px; overflow: hidden;">{{ product.description }}</p>
      <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
        <span style="font-weight: bold; font-size: 18px; color: #28a745;">${{ product.price }}</span>
        <button (click)="addToCart(product)" style="background: #007bff; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer;">
          Add to Cart
        </button>
      </div>
    </div>
  </div>
</div>
